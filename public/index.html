<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-light min-vh-100">

<nav class="navbar navbar-dark bg-primary">
  <div class="container">
    <span class="navbar-brand fw-bold">
      <i class="bi bi-check2-square me-2"></i>Todo App
    </span>
  </div>
</nav>

<main class="container py-4" style="max-width: 600px;">

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <form id="todo-form" class="d-flex gap-2">
        <input
          type="text"
          id="todo-input"
          class="form-control"
          placeholder="What needs to be done?"
          autocomplete="off"
          required
        >
        <button type="submit" class="btn btn-primary px-3">
          <i class="bi bi-plus-lg"></i>
        </button>
      </form>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <span id="item-count" class="text-muted small">0 items left</span>
    <div class="btn-group btn-group-sm">
      <button class="btn btn-outline-secondary active" data-filter="all">All</button>
      <button class="btn btn-outline-secondary" data-filter="active">Active</button>
      <button class="btn btn-outline-secondary" data-filter="completed">Completed</button>
    </div>
    <button id="clear-completed" class="btn btn-sm btn-outline-danger">Clear done</button>
  </div>

  <div class="card shadow-sm">
    <ul id="todo-list" class="list-group list-group-flush"></ul>
    <div id="empty-state" class="card-body text-center text-muted py-5">
      <i class="bi bi-inbox fs-1 d-block mb-2"></i>
      No todos yet. Add one above!
    </div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
